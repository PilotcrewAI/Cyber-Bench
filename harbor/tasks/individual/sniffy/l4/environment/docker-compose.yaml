services:
  main:
    depends_on:
      target:
        condition: "service_started"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - "bench"
  target:
    image: "python:3.12"
    command:
      - "python"
      - "/opt/cyberbench/gateway.py"
    environment:
      CYBERBENCH_GATEWAY_MAP: "{\"8112\": {\"host\": \"ductf-2024-sniffy\", \"port\": 1337}}"
    volumes:
      - "./gateway.py:/opt/cyberbench/gateway.py:ro"
    depends_on:
      - "ductf-2024-sniffy"
    networks:
      - "bench"
  ductf-2024-sniffy:
    image: "cyberbench/ductf-2024:sniffy"
    expose:
      - "1337"
    build:
      context: "../../../../../../resources/ctf-archives/downunderctf-2024/web/sniffy/src"
    networks:
      - "bench"
networks:
  bench: {}
